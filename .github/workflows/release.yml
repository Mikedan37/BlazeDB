name: BlazeDB Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      run_deep_validation:
        description: "Run stress/sanitizer/perf lanes"
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ═══════════════════════════════════════════════════════════
  # JOB 1: Validate Release
  # ═══════════════════════════════════════════════════════════
  validate:
    name: Validate Release
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Xcode Swift toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Validate SemVer tag
        run: |
          if [[ ! "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must be stable SemVer in the form vX.Y.Z"
            exit 1
          fi

      - name: Prepare CI log directories
        run: mkdir -p .logs .artifacts

      - name: Test Tier 0
        run: |
          set -euo pipefail
          swift test --filter BlazeDB_Tier0 2>&1 | tee .logs/tier0.log

      # No --skip-build here: release validate favors a full link each step over PR-gate latency.
      - name: Test Tier 1
        run: |
          set -euo pipefail
          swift test --filter BlazeDB_Tier1 2>&1 | tee .logs/tier1.log

      - name: Test Tier 2 (+ transitional extended companion)
        run: |
          set -euo pipefail
          swift test --filter BlazeDB_Tier2 2>&1 | tee .logs/tier2.log
          swift test --filter BlazeDB_Tier2_Extended 2>&1 | tee .logs/tier2-extended.log

      - name: Run stress tests (+ transitional perf companion)
        if: github.event_name == 'workflow_dispatch' && inputs.run_deep_validation == true
        env:
          RUN_HEAVY_STRESS: "1"
        run: |
          set -euo pipefail
          mkdir -p .logs
          echo "Running Tier 3 heavy tests..."
          swift test --filter 'BlazeDB_Tier3_Heavy\.' 2>&1 | tee .logs/tier3-heavy.log
          swift test --filter BlazeDB_Tier3_Heavy_Perf 2>&1 | tee .logs/tier3-heavy-perf.log

      - name: Run sanitizer tests
        if: github.event_name == 'workflow_dispatch' && inputs.run_deep_validation == true
        run: |
          set -euo pipefail
          mkdir -p .logs
          echo "Running thread sanitizer on Tier 0..."
          swift test --sanitize thread --filter BlazeDB_Tier0 2>&1 | tee .logs/tsan-tier0.log
          if grep -q "Executed 0 tests" .logs/tsan-tier0.log; then
            echo "Sanitizer lane ran zero tests"
            exit 1
          fi

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          mkdir -p .logs
          ps aux > .logs/ps.txt || true
          df -h > .logs/disk.txt || true
          swift --version > .logs/swift-version.txt 2>&1 || true
          xcodebuild -version > .logs/xcode-version.txt 2>&1 || true

      - name: Upload validate logs and artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: release-validate-logs
          path: |
            .logs/
            .artifacts/
          if-no-files-found: ignore
          retention-days: 7

      - name: All tests passed
        run: |
          echo "All tests passed. Release validated."

  # ═══════════════════════════════════════════════════════════
  # JOB 2: Build Release
  # ═══════════════════════════════════════════════════════════
  build:
    name: Build Release
    runs-on: macos-15
    needs: validate
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Xcode Swift toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build release configuration
        run: |
          swift build -c release

      - name: Package release
        run: |
          tar -czf BlazeDB-${{ github.ref_name }}.tar.gz .build/release

      - name: Upload build artifact
        uses: actions/upload-artifact@v5
        with:
          name: release-build
          path: BlazeDB-${{ github.ref_name }}.tar.gz

  # ═══════════════════════════════════════════════════════════
  # JOB 3: Generate Release Notes
  # ═══════════════════════════════════════════════════════════
  release-notes:
    name: Generate release notes
    runs-on: ubuntu-22.04
    needs: validate
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "## BlazeDB ${{ github.ref_name }}" > release_notes.md
          echo "" >> release_notes.md
          echo "### What's new" >> release_notes.md
          echo "" >> release_notes.md

          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "- Initial release" >> release_notes.md
          else
            git log $LAST_TAG..HEAD --pretty=format:"- %s" >> release_notes.md
          fi

          echo "" >> release_notes.md
          echo "### Test results" >> release_notes.md
          echo "" >> release_notes.md
          echo "- Tier 0 gate tests: passing" >> release_notes.md
          echo "- Tier 1 contract tests: passing" >> release_notes.md
          echo "- Tier 3 heavy tests: passing" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Installation" >> release_notes.md
          echo "" >> release_notes.md
          echo "\`\`\`swift" >> release_notes.md
          echo "dependencies: [" >> release_notes.md
          echo "    .package(url: \"https://github.com/${{ github.repository }}.git\", from: \"$VERSION\")" >> release_notes.md
          echo "]" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "### Documentation" >> release_notes.md
          echo "" >> release_notes.md
          echo "- [README](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/README.md)" >> release_notes.md
          echo "- [API Docs](https://github.com/${{ github.repository }}/tree/${{ github.ref_name }}/Docs)" >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          if [ -n "$LAST_TAG" ]; then
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$LAST_TAG...${{ github.ref_name }}" >> release_notes.md
          else
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}" >> release_notes.md
          fi

      - name: Upload release notes
        uses: actions/upload-artifact@v5
        with:
          name: release-notes
          path: release_notes.md

  # ═══════════════════════════════════════════════════════════
  # JOB 4: Create GitHub Release
  # ═══════════════════════════════════════════════════════════
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-22.04
    needs: [validate, build, release-notes]
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: release-build

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: BlazeDB ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            BlazeDB-${{ github.ref_name }}.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release published
        run: |
          echo "Release ${{ github.ref_name }} published successfully."
          echo "Available at: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
