name: BlazeDB Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ═══════════════════════════════════════════════════════════
  # JOB 1: Validate Release
  # ═══════════════════════════════════════════════════════════
  validate:
    name: 🔍 Validate Release
    runs-on: macos-15

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0'

      - name: 🏷️ Validate SemVer Tag
        run: |
          if [[ ! "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must be stable SemVer in the form vX.Y.Z"
            exit 1
          fi
      
      - name: 🧪 Run Full Test Suite
        run: |
          echo "Running Tier 0 gate tests..."
          swift test --filter BlazeDB_Tier0

          echo "Running Tier 1 core contract tests..."
          swift test --filter BlazeDB_Tier1
      
      - name: 💪 Run Stress Tests
        env:
          RUN_HEAVY_STRESS: "1"
        run: |
          echo "Running Tier 3 heavy tests..."
          cd BlazeDBExtraTests && swift test --filter BlazeDB_Tier3_Heavy
      
      - name: 🔬 Run Sanitizer Tests
        run: |
          echo "Running thread sanitizer on Tier 0..."
          SANITIZER_LOG=$(mktemp)
          swift test -Xswiftc -sanitize=thread --filter BlazeDB_Tier0 | tee "$SANITIZER_LOG"
          if grep -q "Executed 0 tests" "$SANITIZER_LOG"; then
            echo "Sanitizer lane ran zero tests"
            exit 1
          fi
      
      - name: ✅ All Tests Passed
        run: |
          echo "✅ All tests passed! Release validated."

  # ═══════════════════════════════════════════════════════════
  # JOB 2: Build Release
  # ═══════════════════════════════════════════════════════════
  build:
    name: 🏗️ Build Release
    runs-on: macos-15
    needs: validate
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: '6.0'
      
      - name: 🏗️ Build Release Configuration
        run: |
          swift build -c release
      
      - name: 📦 Package Release
        run: |
          tar -czf BlazeDB-${{ github.ref_name }}.tar.gz .build/release
      
      - name: 📤 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-build
          path: BlazeDB-${{ github.ref_name }}.tar.gz

  # ═══════════════════════════════════════════════════════════
  # JOB 3: Generate Release Notes
  # ═══════════════════════════════════════════════════════════
  release-notes:
    name: 📝 Generate Release Notes
    runs-on: ubuntu-22.04
    needs: validate
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 📝 Generate Release Notes
        id: notes
        run: |
          echo "## 🎉 BlazeDB ${{ github.ref_name }}" > release_notes.md
          echo "" >> release_notes.md
          echo "### ✨ What's New" >> release_notes.md
          echo "" >> release_notes.md
          
          # Extract commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "- Initial release" >> release_notes.md
          else
            git log $LAST_TAG..HEAD --pretty=format:"- %s" >> release_notes.md
          fi
          
          echo "" >> release_notes.md
          echo "### 🧪 Test Results" >> release_notes.md
          echo "" >> release_notes.md
          echo "- Tier 0 gate tests: passing" >> release_notes.md
          echo "- Tier 1 contract tests: passing" >> release_notes.md
          echo "- Tier 3 heavy tests: passing" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 📦 Installation" >> release_notes.md
          echo "" >> release_notes.md
          echo "\`\`\`swift" >> release_notes.md
          echo "dependencies: [" >> release_notes.md
          echo "    .package(url: \"https://github.com/Mikedan37/BlazeDB.git\", from: \"${{ github.ref_name }}\")" >> release_notes.md
          echo "]" >> release_notes.md
          echo "\`\`\`" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 📚 Documentation" >> release_notes.md
          echo "" >> release_notes.md
          echo "- [README](https://github.com/Mikedan37/BlazeDB/blob/${{ github.ref_name }}/README.md)" >> release_notes.md
          echo "- [API Docs](https://github.com/Mikedan37/BlazeDB/tree/${{ github.ref_name }}/Docs)" >> release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "" >> release_notes.md
          if [ -n "$LAST_TAG" ]; then
            echo "**Full Changelog**: https://github.com/Mikedan37/BlazeDB/compare/$LAST_TAG...${{ github.ref_name }}" >> release_notes.md
          else
            echo "**Full Changelog**: https://github.com/Mikedan37/BlazeDB/releases/tag/${{ github.ref_name }}" >> release_notes.md
          fi
      
      - name: 📤 Upload Release Notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md

  # ═══════════════════════════════════════════════════════════
  # JOB 4: Create GitHub Release
  # ═══════════════════════════════════════════════════════════
  create-release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-22.04
    needs: [validate, build, release-notes]
    permissions:
      contents: write
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 📥 Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: release-build
      
      - name: 📥 Download Release Notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
      
      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: BlazeDB ${{ github.ref_name }}
          body_path: release_notes.md
          files: |
            BlazeDB-${{ github.ref_name }}.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: ✅ Release Published
        run: |
          echo "🎉 Release ${{ github.ref_name }} published successfully!"
          echo "📦 Available at: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"

