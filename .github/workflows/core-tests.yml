name: Core Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

concurrency:
  group: core-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-tests:
    # Must match Package.swift platforms (.macOS(.v15)); macos-14 runners cannot load test bundles built for macOS 15.
    runs-on: macos-15
    name: Core Tests (Swift 6)
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Build Core
        run: swift build --target BlazeDBCore

      - name: Build CLI Tools
        run: |
          swift build --target BlazeDoctor
          swift build --target BlazeDump
          swift build --target BlazeInfo
      - name: Run Tier 0 (Gate) Tests
        run: swift test --filter BlazeDB_Tier0

      - name: Run Tier 1 Tests
        run: swift test --filter BlazeDB_Tier1
