name: Core Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  core-tests:
    runs-on: macos-14
    name: Core Tests (Swift 6)
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Build Core
        run: swift build --target BlazeDBCore

      - name: Build CLI Tools
        run: |
          swift build --target BlazeDoctor
          swift build --target BlazeDump
          swift build --target BlazeInfo
      - name: Run Tier 0 (Gate) Tests
        run: swift test --filter BlazeDB_Tier0

      - name: Run Tier 1 Tests
        run: swift test --filter BlazeDB_Tier1
        continue-on-error: true
