name: Vapor Reference Integration Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vapor-reference-smoke:
    name: Linux (Swift 6.2) — Vapor reference integration smoke
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Swift version
        run: swift --version

      - name: Prepare log directories
        run: mkdir -p .logs .artifacts

      - name: Run Vapor reference smoke script
        run: |
          set -euo pipefail
          chmod +x ./Scripts/smoke-vapor-reference.sh
          ./Scripts/smoke-vapor-reference.sh

      - name: Upload smoke logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: vapor-reference-smoke-logs
          path: |
            .logs/
            .artifacts/
          if-no-files-found: ignore
          retention-days: 7
