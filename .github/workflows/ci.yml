# Single workflow for push/PR: macOS gate + optional Linux. No duplicate OSS workflows.
# See Docs/Testing/CI_AND_TEST_TIERS.md

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-15:
    name: macOS 15 — build, CLI, tests, clean-checkout, quickstart
    runs-on: macos-15
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Use the runner's Xcode Swift for tests. setup-swift's OSS toolchain breaks XCTest
      # (missing XCTestCore at dlopen — see swiftpm_testing_helper / BlazeDBPackageTests).
      - name: Xcode Swift toolchain
        run: |
          xcodebuild -version
          swift --version
          which swift

      - name: Build BlazeDBCore
        run: swift build --target BlazeDBCore

      - name: Sendable observation regression check
        run: ./Scripts/check-sendable-observation.sh

      - name: Build CLI tools
        run: |
          swift build --target BlazeDoctor
          swift build --target BlazeDump
          swift build --target BlazeInfo

      - name: Test Tier 0
        run: swift test --filter BlazeDB_Tier0

      - name: Test Tier 1 (fast)
        run: swift test --skip-build --filter BlazeDB_Tier1Fast

      - name: Install ripgrep (verification scripts)
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
        run: |
          command -v rg >/dev/null 2>&1 || brew install ripgrep

      - name: Verify clean-checkout flow
        run: ./Scripts/verify-clean-checkout.sh

      - name: Verify README quickstart
        run: ./Scripts/verify-readme-quickstart.sh

  linux:
    name: Linux (Swift 6.2) — core + Tier 0
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Swift version
        run: swift --version

      - name: Build core
        run: swift build --target BlazeDBCore

      - name: Build CLI tools
        run: |
          swift build --target BlazeDoctor
          swift build --target BlazeDump
          swift build --target BlazeInfo

      - name: Test Tier 0
        run: swift test --filter BlazeDB_Tier0
