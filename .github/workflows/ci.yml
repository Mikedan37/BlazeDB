name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'

env:
  SWIFT_VERSION: '6.0'

jobs:
  test:
    name: Build & Test
    runs-on: macos-14
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Swift
      uses: swift-actions/setup-swift@v1
      with:
        swift-version: ${{ env.SWIFT_VERSION }}
    
    - name: Swift Version
      run: swift --version
    
    - name: Build
      run: swift build -v
    
    - name: Build Core Test Target
      run: swift build --target BlazeDBCoreGateTests

  lint:
    name: Lint
    runs-on: macos-14
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Swift
      uses: swift-actions/setup-swift@v1
      with:
        swift-version: ${{ env.SWIFT_VERSION }}
    
    - name: Check Swift Format
      run: |
        # Basic syntax check
        swift build 2>&1 | grep -i "error:" && exit 1 || exit 0
        
    - name: Check Documentation
      run: |
        # Verify README exists and is valid
        test -f README.md || exit 1
        test -f CONTRIBUTING.md || exit 1
        test -f CHANGELOG.md || exit 1
        test -f LICENSE || exit 1

  linux-test:
    name: Linux Build & Test
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Swift
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: ${{ env.SWIFT_VERSION }}
    
    - name: Build
      run: swift build -v
