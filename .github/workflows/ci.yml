# Single workflow for push/PR: macOS gate + optional Linux. No duplicate OSS workflows.
# See Docs/Testing/CI_AND_TEST_TIERS.md

name: PR Gate (push / pull request)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  macos-15:
    name: macOS 15 — build, CLI, tests
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Cache SwiftPM build
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # Use the runner's Xcode Swift for tests. setup-swift's OSS toolchain breaks XCTest
      # (missing XCTestCore at dlopen — see swiftpm_testing_helper / BlazeDBPackageTests).
      - name: Xcode Swift toolchain
        run: |
          xcodebuild -version
          swift --version
          which swift

      - name: Build BlazeDBCore
        run: swift build --target BlazeDBCore

      - name: Sendable observation regression check
        run: ./Scripts/check-sendable-observation.sh

      - name: Build CLI tools
        run: |
          swift build --product blazedb
          swift build --target BlazeDoctor
          swift build --target BlazeDump
          swift build --target BlazeInfo

      - name: Prepare CI log directories
        run: mkdir -p .logs .artifacts

      - name: Test Tier 0
        run: |
          set -euo pipefail
          BLAZEDB_TEST_SCOPE=tier0 swift test --filter BlazeDB_Tier0 2>&1 | tee .logs/tier0.log

      - name: Test Tier 1
        run: |
          set -euo pipefail
          swift test --skip-build --filter BlazeDB_Tier1 2>&1 | tee .logs/tier1.log

      - name: Test CLI bundle
        run: |
          set -euo pipefail
          swift test --skip-build --filter BlazeDB_CLITests 2>&1 | tee .logs/cli.log

      - name: Verify README quickstart
        run: |
          set -euo pipefail
          ./Scripts/verify-readme-quickstart.sh 2>&1 | tee .logs/verify-readme-quickstart.log

      - name: Verify README samples
        run: |
          set -euo pipefail
          ./Scripts/verify-readme-samples.sh 2>&1 | tee .logs/verify-readme-samples.log

      - name: KMM shared — build iOS bridge and link framework
        run: |
          set -euo pipefail
          chmod +x ./Scripts/build-kmm-ios-bridge.sh
          ./Scripts/build-kmm-ios-bridge.sh
          cd Examples/android
          chmod +x gradlew
          ./gradlew :shared:compileKotlinIosSimulatorArm64 :shared:compileKotlinIosArm64 \
            :shared:linkDebugFrameworkIosSimulatorArm64 :shared:linkDebugFrameworkIosArm64 \
            :shared:iosSimulatorArm64Test

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          mkdir -p .logs
          ps aux > .logs/ps.txt || true
          df -h > .logs/disk.txt || true
          swift --version > .logs/swift-version.txt 2>&1 || true
          xcodebuild -version > .logs/xcode-version.txt 2>&1 || true

      - name: Upload CI macOS logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ci-macos-logs
          path: |
            .logs/
            .artifacts/
          if-no-files-found: ignore
          retention-days: 7

  apple-cross-compile:
    name: Apple platforms — cross-compile BlazeDBCore
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Cache SwiftPM build
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-apple-cross-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-apple-cross-

      - name: Xcode Swift toolchain
        run: |
          xcodebuild -version
          swift --version
          which swift

      - name: Prepare CI log directories
        run: mkdir -p .logs .artifacts

      - name: Cross-compile BlazeDBCore for Apple platforms
        run: |
          set -euo pipefail
          chmod +x ./Scripts/ci-apple-cross-compile.sh
          ./Scripts/ci-apple-cross-compile.sh 2>&1 | tee .logs/apple-cross-compile.log

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          mkdir -p .logs
          swift --version > .logs/swift-version.txt 2>&1 || true
          xcodebuild -version > .logs/xcode-version.txt 2>&1 || true
          xcodebuild -showsdks > .logs/xcode-sdks.txt 2>&1 || true

      - name: Upload CI Apple cross-compile logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ci-apple-cross-compile-logs
          path: |
            .logs/
            .artifacts/
          if-no-files-found: ignore
          retention-days: 7

  linux:
    name: Linux (Swift 6.2) — core + Tier 0
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Cache SwiftPM build
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Setup Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Swift version
        run: swift --version

      - name: Build core
        run: swift build --target BlazeDBCore

      - name: Build CLI tools
        run: |
          swift build --product blazedb
          swift build --target BlazeDoctor
          swift build --target BlazeDump
          swift build --target BlazeInfo

      - name: Prepare CI log directories
        run: mkdir -p .logs .artifacts

      - name: Test Tier 0
        run: |
          set -euo pipefail
          BLAZEDB_TEST_SCOPE=tier0 swift test --filter BlazeDB_Tier0 2>&1 | tee .logs/tier0.log

      - name: Test CLI bundle
        run: |
          set -euo pipefail
          swift test --skip-build --filter BlazeDB_CLITests 2>&1 | tee .logs/cli.log

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          mkdir -p .logs
          ps aux > .logs/ps.txt || true
          df -h > .logs/disk.txt || true
          swift --version > .logs/swift-version.txt 2>&1 || true

      - name: Upload CI Linux logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ci-linux-logs
          path: |
            .logs/
            .artifacts/
          if-no-files-found: ignore
          retention-days: 7

  android-cross-compile:
    name: Android — cross-compile BlazeDBAndroidBridge
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    env:
      # Pre-set on GitHub runner images; conflicts with the Swift Android SDK bundle.
      ANDROID_NDK_ROOT: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Cache Android Swift SDK artifact
        uses: actions/cache@v5
        with:
          path: .artifacts/android-sdk
          key: android-swift-sdk-artifact-6.3.2-${{ hashFiles('Scripts/android-swift-config.sh') }}
          restore-keys: |
            android-swift-sdk-artifact-6.3.2-

      - name: Cache SwiftPM build
        uses: actions/cache@v5
        with:
          path: |
            .build
            ~/.swiftpm/swift-sdks
            ~/.config/swiftpm/swift-sdks
          key: ${{ runner.os }}-android-sdk-v2-${{ hashFiles('Package.swift', 'Package.resolved', 'Scripts/android-swift-config.sh', 'Scripts/install-android-swift.sh', 'Scripts/ci-android-cross-compile.sh', 'Scripts/fetch-android-sdk-artifact.sh') }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-v2-
            ${{ runner.os }}-android-sdk-

      - name: Cache Android NDK
        uses: actions/cache@v5
        with:
          path: |
            .artifacts/android-sdk/swift-6.3.2-RELEASE_android.artifactbundle/swift-android/android-ndk-r27d
            ~/.config/swiftpm/swift-sdks/swift-6.3.2-RELEASE_android.artifactbundle/swift-android/android-ndk-r27d
          # NDK path follows BLAZEDB_ANDROID_NDK_VERSION in Scripts/android-swift-config.sh
          key: android-ndk-r27d-linux-v2
          restore-keys: |
            android-ndk-r27d-linux-

      - name: Install OSS Swift (Android host toolchain)
        run: |
          set -euo pipefail
          chmod +x ./Scripts/install-android-swift.sh ./Scripts/ci-android-cross-compile.sh
          ./Scripts/install-android-swift.sh

      - name: Swift version
        run: swift --version

      - name: Cross-compile BlazeDBAndroidBridge for Android
        run: |
          set -euo pipefail
          mkdir -p .logs .artifacts
          ./Scripts/ci-android-cross-compile.sh 2>&1 | tee .logs/android-cross-compile.log

      - name: Verify libBlazeDBAndroidBridge.so
        run: |
          set -euo pipefail
          for triple in aarch64-unknown-linux-android28 x86_64-unknown-linux-android28; do
            SO=".build/$triple/debug/libBlazeDBAndroidBridge.so"
            test -f "$SO"
            file "$SO"
            ls -lh "$SO"
          done

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: KMM shared — compile Android Kotlin
        run: |
          set -euo pipefail
          chmod +x ./Scripts/setup-android-gradle-sdk-linux.sh
          ./Scripts/setup-android-gradle-sdk-linux.sh
          export ANDROID_HOME="${ANDROID_HOME:-$PWD/.artifacts/android-gradle-sdk-linux}"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          cd Examples/android
          chmod +x gradlew
          ./gradlew :shared:compileDebugKotlinAndroid

      - name: Stage KMM Android native libs for emulator job
        run: |
          set -euo pipefail
          source ./Scripts/android-swift-config.sh
          STAGE=".artifacts/kmm-android-native"
          RUNTIME_BASE=".artifacts/android-sdk/${BLAZEDB_ANDROID_SDK_ARTIFACT%.tar.gz}/swift-android/swift-resources/usr/lib"
          mkdir -p "$STAGE/lib/arm64-v8a" "$STAGE/lib/x86_64" \
            "$STAGE/swift-runtime/arm64-v8a" "$STAGE/swift-runtime/x86_64"
          cp .build/aarch64-unknown-linux-android28/debug/libBlazeDBAndroidBridge.so "$STAGE/lib/arm64-v8a/"
          cp .build/x86_64-unknown-linux-android28/debug/libBlazeDBAndroidBridge.so "$STAGE/lib/x86_64/"
          cp "$RUNTIME_BASE/swift-aarch64/android"/*.so "$STAGE/swift-runtime/arm64-v8a/"
          cp "$RUNTIME_BASE/swift-x86_64/android"/*.so "$STAGE/swift-runtime/x86_64/"

      - name: Upload KMM Android native artifact
        uses: actions/upload-artifact@v5
        with:
          name: kmm-android-native
          path: .artifacts/kmm-android-native/
          retention-days: 7

      - name: Prepare CI log directories
        if: always()
        run: mkdir -p .logs .artifacts

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          mkdir -p .logs
          swift --version > .logs/swift-version.txt 2>&1 || true
          swift sdk list > .logs/swift-sdk-list.txt 2>&1 || true

      - name: Upload CI Android cross-compile logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ci-android-cross-compile-logs
          path: |
            .logs/
            .artifacts/
          if-no-files-found: ignore
          retention-days: 7

  kmm-android-emulator:
    name: KMM Android — emulator runtime (Linux KVM)
    runs-on: ubuntu-latest
    needs: android-cross-compile
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download Android native bridge from Linux job
        uses: actions/download-artifact@v5
        with:
          name: kmm-android-native
          path: .artifacts/kmm-android-native

      - name: Stage Swift Android libs for Gradle (x86_64 CI emulator)
        run: |
          set -euo pipefail
          chmod +x ./Scripts/stage-kmm-android-native-for-gradle.sh
          ./Scripts/stage-kmm-android-native-for-gradle.sh .artifacts/kmm-android-native x86_64

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android Gradle SDK + emulator (Linux)
        run: |
          set -euo pipefail
          chmod +x ./Scripts/setup-android-gradle-sdk-linux.sh
          BLAZEDB_ANDROID_SDK_INSTALL_EMULATOR=1 ./Scripts/setup-android-gradle-sdk-linux.sh

      - name: KMM Android emulator runtime smoke
        uses: reactivecircus/android-emulator-runner@v2
        env:
          BLAZEDB_SWIFT_BUILD: ${{ github.workspace }}/.build
          ANDROID_HOME: ${{ github.workspace }}/.artifacts/android-gradle-sdk-linux
          ANDROID_SDK_ROOT: ${{ github.workspace }}/.artifacts/android-gradle-sdk-linux
          BLAZEDB_ANDROID_ABIS: x86_64
          CI_EMULATOR_MANAGED: "1"
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          disable-spellchecker: true
          disable-linux-hw-accel: false
          emulator-boot-timeout: 600
          script: |
            export PATH="$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:$PATH"
            chmod +x ./Scripts/ci-kmm-android-emulator-smoke.sh
            bash ./Scripts/ci-kmm-android-emulator-smoke.sh

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          mkdir -p .logs
          adb devices -l > .logs/adb-devices.txt 2>&1 || true
          timeout 60 adb logcat -d > .logs/adb-logcat.txt 2>&1 || true

      - name: Upload KMM Android runtime logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ci-kmm-android-runtime-logs
          path: .logs/
          if-no-files-found: ignore
          retention-days: 7

  kmm-android-packaging:
    name: KMM Android — packaging (macOS)
    runs-on: macos-15
    needs: android-cross-compile
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download Android native bridge from Linux job
        uses: actions/download-artifact@v5
        with:
          name: kmm-android-native
          path: .artifacts/kmm-android-native

      - name: Stage Swift Android libs for Gradle (arm64 release)
        run: |
          set -euo pipefail
          chmod +x ./Scripts/stage-kmm-android-native-for-gradle.sh
          ./Scripts/stage-kmm-android-native-for-gradle.sh .artifacts/kmm-android-native arm64-v8a

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android Gradle SDK
        run: |
          set -euo pipefail
          chmod +x ./Scripts/setup-android-gradle-sdk.sh
          ./Scripts/setup-android-gradle-sdk.sh

      - name: Package and verify KMM artifacts
        run: |
          set -euo pipefail
          mkdir -p .logs
          chmod +x ./Scripts/package-kmm-artifacts.sh ./Scripts/verify-kmm-packaging.sh
          export BLAZEDB_SWIFT_BUILD="$PWD/.build"
          ./Scripts/package-kmm-artifacts.sh 2>&1 | tee .logs/kmm-packaging.log

      - name: Upload KMM packaging artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: kmm-packaging-dist
          path: dist/kmm/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload KMM packaging logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ci-kmm-android-packaging-logs
          path: .logs/
          if-no-files-found: ignore
          retention-days: 7
