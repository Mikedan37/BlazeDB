name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Swift
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: "6.0"

    - name: Build (clean runner)
      run: swift build -v

    - name: Run Tier 0 suite
      run: swift test --filter BlazeDB_Tier0

    - name: Run Tier 1 suite (skip rebuild)
      run: swift test --skip-build --filter BlazeDB_Tier1
