name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  SWIFT_VERSION: '6.0'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-14
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Swift
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: ${{ env.SWIFT_VERSION }}

    - name: Build
      run: swift build -v

    - name: Run Tests
      run: |
        if [[ "${{ github.event_name }}" == "push" ]]; then
          echo "Push lane: full test suite"
          swift test
        else
          echo "PR lane: fast gate suite"
          swift test --filter BlazeDB_Tier0
        fi
