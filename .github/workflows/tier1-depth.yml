# Weekly / manual Tier 1 depth: extended + perf (not the default PR gate).
# See Docs/Testing/CI_AND_TEST_TIERS.md

name: Tier 1 depth

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: tier1-depth-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tier1-depth-macos:
    name: macOS 15 — Tier1Extended + Tier1Perf
    runs-on: macos-15
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Xcode Swift toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build BlazeDBCore
        run: swift build --target BlazeDBCore

      - name: Prepare CI log directories
        run: mkdir -p .logs .artifacts

      - name: Test Tier 1 extended
        run: |
          set -euo pipefail
          swift test --filter BlazeDB_Tier1Extended 2>&1 | tee .logs/tier1extended.log

      # Rebuild Tier1Perf (see nightly.yml — avoid --skip-build after Tier1Extended-only build).
      - name: Test Tier 1 perf
        run: |
          set -euo pipefail
          swift test --filter BlazeDB_Tier1Perf 2>&1 | tee .logs/tier1perf.log

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          mkdir -p .logs
          ps aux > .logs/ps.txt || true
          df -h > .logs/disk.txt || true
          swift --version > .logs/swift-version.txt 2>&1 || true
          xcodebuild -version > .logs/xcode-version.txt 2>&1 || true

      - name: Upload tier1-depth macOS logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: tier1-depth-macos-logs
          path: |
            .logs/
            .artifacts/
          if-no-files-found: ignore
          retention-days: 7
