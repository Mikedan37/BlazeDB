# Weekly / manual depth validation lane.
# See Docs/Testing/CI_AND_TEST_TIERS.md

name: Depth validation (Tier2/Tier3 companions)

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: depth-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  depth-macos:
    name: macOS 15 — Tier2 + Tier3_Heavy (with companions)
    runs-on: macos-15
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Xcode Swift toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build BlazeDBCore
        run: swift build --target BlazeDBCore

      - name: Prepare CI log directories
        run: mkdir -p .logs .artifacts

      - name: Test Tier 2 (+ transitional extended companion)
        run: |
          set -euo pipefail
          swift test --filter BlazeDB_Tier2 2>&1 | tee .logs/tier2.log
          swift test --filter BlazeDB_Tier2_Extended 2>&1 | tee .logs/tier2-extended.log

      - name: Test Tier 3 heavy (+ transitional perf companion)
        run: |
          set -euo pipefail
          swift test --filter BlazeDB_Tier3_Heavy 2>&1 | tee .logs/tier3-heavy.log
          swift test --filter BlazeDB_Tier3_Heavy_Perf 2>&1 | tee .logs/tier3-heavy-perf.log

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          mkdir -p .logs
          ps aux > .logs/ps.txt || true
          df -h > .logs/disk.txt || true
          swift --version > .logs/swift-version.txt 2>&1 || true
          xcodebuild -version > .logs/xcode-version.txt 2>&1 || true

      - name: Upload depth macOS logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: depth-macos-logs
          path: |
            .logs/
            .artifacts/
          if-no-files-found: ignore
          retention-days: 7
