name: OSS Readiness Evidence

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: oss-readiness-evidence-${{ github.ref }}
  cancel-in-progress: true

jobs:
  local-evidence:
    name: Clean Snapshot Evidence
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify clean-checkout flow
        run: ./Scripts/verify-clean-checkout.sh

      - name: Verify README quickstart
        run: ./Scripts/verify-readme-quickstart.sh

  legacy-tag-repro-scan:
    name: Legacy Tag Repro Scan
    runs-on: macos-15
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run legacy tag probe
        run: ./Scripts/check-release-tag-builds.sh

      - name: Upload tag probe logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: legacy-tag-probe-logs
          path: .tagcheck-*.log
          if-no-files-found: ignore
