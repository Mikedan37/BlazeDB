            .logs/
            .artifacts/
          if-no-files-found: ignore
          retention-days: 7

  nightly-macos-tsan-tier0:
    name: macOS 15 — Tier0 ThreadSanitizer
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Xcode Swift toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Prepare CI log directories
        run: mkdir -p .logs .artifacts

      - name: Run thread sanitizer on Tier 0
        run: |
          set -euo pipefail
          mkdir -p .logs
          swift test --sanitize thread --filter BlazeDB_Tier0 2>&1 | tee .logs/tsan-tier0.log
          if grep -q "Executed 0 tests" .logs/tsan-tier0.log; then
            echo "Sanitizer lane ran zero tests"
            exit 1
          fi

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          mkdir -p .logs
          ps aux > .logs/ps.txt || true
          df -h > .logs/disk.txt || true
          swift --version > .logs/swift-version.txt 2>&1 || true
          xcodebuild -version > .logs/xcode-version.txt 2>&1 || true

      - name: Upload nightly macOS TSan logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: nightly-macos-tsan-logs
          path: |
            .logs/
            .artifacts/
          if-no-files-found: ignore
          retention-days: 7

