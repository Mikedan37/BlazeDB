        with:
          name: nightly-linux-tier2-core-logs
          path: |
            .logs/
            .artifacts/
          if-no-files-found: ignore
          retention-days: 7

  nightly-linux-tier2-extended:
    name: Linux (Swift 6.2) — Tier2 (extended)
    runs-on: ubuntu-22.04
    timeout-minutes: 240
