name: Nightly confidence

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # macOS Tier3: quarantined (continue-on-error). Linux Tier3: blocking. See Docs/Testing/CI_AND_TEST_TIERS.md § Nightly Tier3 policy.
  nightly-macos-tier3-heavy:
    name: macOS 15 — Tier3 Heavy (quarantined, non-blocking)
    runs-on: macos-15
    # Tier3 XCTest perf uses reduced measure iterations and fixtures when GITHUB_ACTIONS is set
    # (see Docs/Testing/CI_AND_TEST_TIERS.md § "Tier 3 profiling: CI vs local"). Quarantined so
    # Tier1/Tier2 nightly gates stay authoritative.
    continue-on-error: true
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Cache SwiftPM build
        uses: actions/cache@v5
        with:
          path: .build
          key: nightly-${{ runner.os }}-spm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            nightly-${{ runner.os }}-spm-
            ${{ runner.os }}-spm-

      - name: Xcode Swift toolchain
        run: |
          xcodebuild -version
          swift --version
          which swift

      - name: Build BlazeDBCore
        run: swift build --target BlazeDBCore

      - name: Prepare CI log directories
        run: mkdir -p .logs .artifacts

      - name: Test Tier 3 heavy (+ transitional perf companion)
        id: tier3_tests
        run: |
          set -euo pipefail
          mkdir -p .logs
          # GITHUB_ACTIONS is set by the platform; Tier3 perf tests read it to lighten measure() load.
          # SwiftPM enables Swift Testing alongside XCTest; this repo has no @Test suites, so the
          # Swift Testing runner exits non-zero ("0 tests") and fails the step unless disabled.
          # Plain BlazeDB_Tier3_Heavy matches BlazeDB_Tier3_Heavy_Perf (regex substring); require the bundle dot.
          swift test --disable-swift-testing --filter 'BlazeDB_Tier3_Heavy\.' 2>&1 | tee .logs/tier3-heavy.log
          swift test --disable-swift-testing --filter BlazeDB_Tier3_Heavy_Perf 2>&1 | tee .logs/tier3-heavy-perf.log

      - name: Summarize Tier3 diagnostics
        if: always()
        env:
          TIER3_TEST_OUTCOME: ${{ steps.tier3_tests.outcome }}
        run: |
          set -euo pipefail
          mkdir -p .logs .artifacts
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          logs = [Path(".logs/tier3-heavy.log"), Path(".logs/tier3-heavy-perf.log")]
          outcome = os.environ.get("TIER3_TEST_OUTCOME", "unknown")

          text_parts = []
          present_logs = []
          for log_path in logs:
              if log_path.exists():
                  present_logs.append(log_path)
                  text_parts.append(log_path.read_text(errors="replace"))

          combined = "\n".join(text_parts)
          classification = "unknown"
          detail = "No known failure signature detected."

          classifiers = [
              ("timeout", r"timed out|time limit|deadline exceeded"),
              ("killed_or_oom", r"\bKilled\b|SIGKILL|signal 9|out of memory|oom"),
              ("xctest_failure", r"Test Case '.*' failed|Test Suite '.*' failed|XCTAssert|XCTUnwrap"),
              ("swiftpm_abort", r"error: Exited with unexpected signal code|error: fatalError"),
          ]

          for label, pattern in classifiers:
              if re.search(pattern, combined, flags=re.IGNORECASE):
                  classification = label
                  detail = f"Matched pattern: {pattern}"
                  break

          summary_lines = [
              "## Tier3 diagnostics",
              f"- Step outcome: `{outcome}`",
              f"- Classification: `{classification}`",
              f"- Detail: {detail}",
              "",
          ]

          artifact_report = Path(".artifacts/tier3-diagnostics.txt")
          with artifact_report.open("w", encoding="utf-8") as report:
              report.write("Tier3 diagnostics\n")
              report.write(f"step_outcome={outcome}\n")
              report.write(f"classification={classification}\n")
              report.write(f"detail={detail}\n\n")

              if not present_logs:
                  report.write("No tier3 log files found.\n")
                  summary_lines.append("- Logs: none found in `.logs/`")
              else:
                  summary_lines.append("- Logs analyzed:")
                  for log_path in present_logs:
                      summary_lines.append(f"  - `{log_path}`")
                      report.write(f"--- {log_path} (last 80 lines) ---\n")
                      tail = "\n".join(log_path.read_text(errors="replace").splitlines()[-80:])
                      report.write(tail + "\n\n")

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              with open(step_summary, "a", encoding="utf-8") as fh:
                  fh.write("\n".join(summary_lines) + "\n")

          print("\n".join(summary_lines))
          PY

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          mkdir -p .logs
          ps aux > .logs/ps.txt || true
          df -h > .logs/disk.txt || true
          swift --version > .logs/swift-version.txt 2>&1 || true
          xcodebuild -version > .logs/xcode-version.txt 2>&1 || true

      - name: Upload nightly macOS Tier3 heavy logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: nightly-macos-tier3-heavy-logs
          path: |
            .logs/
            .artifacts/
          if-no-files-found: ignore
          retention-days: 7

  nightly-macos-tier1:
