        with:
          name: nightly-macos-tier1-logs
          path: |
            .logs/
            .artifacts/
          if-no-files-found: ignore
          retention-days: 7

  nightly-macos-tier2-strict:
    name: macOS 15 — Tier2 strict
    runs-on: macos-15
    timeout-minutes: 180

    steps:
