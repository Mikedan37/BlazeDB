name: Deep Validation (weekly)

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

concurrency:
  group: deep-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deep-macos-full:
    name: macOS 15 — full deep validation
    runs-on: macos-15
    timeout-minutes: 480

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Cache SwiftPM build
        uses: actions/cache@v5
        with:
          path: .build
          key: deep-${{ runner.os }}-spm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            deep-${{ runner.os }}-spm-
            nightly-${{ runner.os }}-spm-
            ${{ runner.os }}-spm-

      - name: Xcode Swift toolchain
        run: |
          xcodebuild -version
          swift --version
          which swift

      - name: Build BlazeDBCore
        run: swift build --target BlazeDBCore

      - name: Prepare CI log directories
        run: mkdir -p .logs .artifacts

      - name: Test Tier 0
        run: |
          set -euo pipefail
          swift test --filter BlazeDB_Tier0 2>&1 | tee .logs/tier0.log

      - name: Test Tier 1
        run: |
          set -euo pipefail
          swift test --skip-build --filter BlazeDB_Tier1 2>&1 | tee .logs/tier1.log

      - name: Test Tier 2 integration/recovery
        run: |
          set -euo pipefail
          mkdir -p .logs
          echo ">>> ./Scripts/run-tier2.sh --strict (Tier 2 strict mode; script prints strict banner)" | tee .logs/tier2.log
          ./Scripts/run-tier2.sh --strict 2>&1 | tee -a .logs/tier2.log

      - name: Test Tier 3 heavy stress/fuzz (+ transitional perf companion)
        env:
          RUN_HEAVY_STRESS: "1"
        run: |
          set -euo pipefail
          mkdir -p .logs
          swift test --filter 'BlazeDB_Tier3_Heavy\.' 2>&1 | tee .logs/tier3-heavy.log
          swift test --filter BlazeDB_Tier3_Heavy_Perf 2>&1 | tee .logs/tier3-heavy-perf.log

      - name: Test Tier 3 destructive/fault injection
        run: |
          set -euo pipefail
          mkdir -p .logs
          ./Scripts/run-tier3.sh 2>&1 | tee .logs/tier3-destructive.log

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          mkdir -p .logs
          ps aux > .logs/ps.txt || true
          df -h > .logs/disk.txt || true
          swift --version > .logs/swift-version.txt 2>&1 || true
          xcodebuild -version > .logs/xcode-version.txt 2>&1 || true

      - name: Upload deep macOS full logs and artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: deep-macos-full-logs
          path: |
            .logs/
            .artifacts/
          if-no-files-found: ignore
          retention-days: 7

  deep-macos-tsan:
    name: macOS 15 — Tier0 + Tier1 ThreadSanitizer
    runs-on: macos-15
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Xcode Swift toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Prepare CI log directories
        run: mkdir -p .logs .artifacts

      - name: Run thread sanitizer on Tier 0
        run: |
          set -euo pipefail
          mkdir -p .logs
          swift test --sanitize thread --filter BlazeDB_Tier0 2>&1 | tee .logs/tsan-tier0.log
          if grep -q "Executed 0 tests" .logs/tsan-tier0.log; then
            echo "Tier 0 sanitizer lane ran zero tests"
            exit 1
          fi

      - name: Run thread sanitizer on Tier 1
        run: |
          set -euo pipefail
          mkdir -p .logs
          swift test --sanitize thread --filter BlazeDB_Tier1 2>&1 | tee .logs/tsan-tier1.log
          if grep -q "Executed 0 tests" .logs/tsan-tier1.log; then
            echo "Tier 1 sanitizer lane ran zero tests"
            exit 1
          fi

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          mkdir -p .logs
          ps aux > .logs/ps.txt || true
          df -h > .logs/disk.txt || true
          swift --version > .logs/swift-version.txt 2>&1 || true
          xcodebuild -version > .logs/xcode-version.txt 2>&1 || true

      - name: Upload deep macOS TSan logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: deep-macos-tsan-logs
          path: |
            .logs/
            .artifacts/
          if-no-files-found: ignore
          retention-days: 7

  deep-linux-extended:
    name: Linux (Swift 6.2) — Tier0 + Tier1 + Tier2 (+ extended)
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Cache SwiftPM build
        uses: actions/cache@v5
        with:
          path: .build
          key: deep-${{ runner.os }}-spm-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            deep-${{ runner.os }}-spm-
            nightly-${{ runner.os }}-spm-
            ${{ runner.os }}-spm-

      - name: Setup Swift 6.2
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.2"

      - name: Swift version
        run: swift --version

      - name: Build core
        run: swift build --target BlazeDBCore

      - name: Prepare CI log directories
        run: mkdir -p .logs .artifacts

      - name: Test Tier 0
        run: |
          set -euo pipefail
          swift test --filter BlazeDB_Tier0 2>&1 | tee .logs/tier0.log

      - name: Test Tier 1
        run: |
          set -euo pipefail
          swift test --skip-build --filter 'BlazeDB_Tier1\.' 2>&1 | tee .logs/tier1.log

      - name: Test Tier 2
        run: |
          set -euo pipefail
          swift test --skip-build --filter BlazeDB_Tier2 2>&1 | tee .logs/tier2.log
          swift test --filter BlazeDB_Tier2_Extended 2>&1 | tee .logs/tier2-extended.log

      - name: Test Tier 3 heavy (+ transitional perf companion)
        run: |
          set -euo pipefail
          swift test --skip-build --filter 'BlazeDB_Tier3_Heavy\.' 2>&1 | tee .logs/tier3-heavy.log
          swift test --filter BlazeDB_Tier3_Heavy_Perf 2>&1 | tee .logs/tier3-heavy-perf.log

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          mkdir -p .logs
          ps aux > .logs/ps.txt || true
          df -h > .logs/disk.txt || true
          swift --version > .logs/swift-version.txt 2>&1 || true

      - name: Upload deep Linux extended logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: deep-linux-extended-logs
          path: |
            .logs/
            .artifacts/
          if-no-files-found: ignore
          retention-days: 7
