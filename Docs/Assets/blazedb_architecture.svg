<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 880" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace">
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#8B949E" stroke-width="1.2"/>
    </marker>
    <marker id="ahO" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#D97706" stroke-width="1.2"/>
    </marker>
    <marker id="ahG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#059669" stroke-width="1.2"/>
    </marker>
    <marker id="ahP" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#7C3AED" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="880" fill="#FAFAF9"/>

  <!-- Title block — like a schematic title block -->
  <text x="380" y="38" text-anchor="middle" fill="#1C1917" font-size="13" font-weight="400" letter-spacing="3">BLAZEDB  ARCHITECTURE</text>
  <line x1="120" y1="50" x2="640" y2="50" stroke="#D6D3D1" stroke-width="0.5"/>
  <text x="380" y="68" text-anchor="middle" fill="#A8A29E" font-size="10" letter-spacing="1">LAYERED EMBEDDED DATABASE ENGINE FOR SWIFT</text>

  <!-- ===== STATE NODES ===== -->
  <!-- Each node: sharp rectangle, no fill, thin border, monospace label -->

  <!-- S0: APPLICATION -->
  <rect x="220" y="100" width="320" height="50" fill="none" stroke="#D97706" stroke-width="1.5"/>
  <text x="232" y="121" fill="#D97706" font-size="10" letter-spacing="0.5">S0</text>
  <text x="380" y="121" text-anchor="middle" fill="#1C1917" font-size="13" font-weight="500">APPLICATION</text>
  <text x="380" y="139" text-anchor="middle" fill="#78716C" font-size="10">Swift  |  SwiftUI  |  Vapor</text>

  <!-- Transition S0 → S1 -->
  <line x1="380" y1="150" x2="380" y2="188" stroke="#8B949E" stroke-width="1" marker-end="url(#ah)"/>
  <text x="394" y="174" fill="#A8A29E" font-size="9" font-style="italic">init()</text>

  <!-- S1: BLAZEDB CLIENT -->
  <rect x="220" y="192" width="320" height="50" fill="none" stroke="#1C1917" stroke-width="1.5"/>
  <text x="232" y="213" fill="#78716C" font-size="10" letter-spacing="0.5">S1</text>
  <text x="380" y="213" text-anchor="middle" fill="#1C1917" font-size="13" font-weight="500">BlazeDBClient</text>
  <text x="380" y="231" text-anchor="middle" fill="#78716C" font-size="10">public API surface</text>

  <!-- Transition S1 → S2 -->
  <line x1="380" y1="242" x2="380" y2="280" stroke="#8B949E" stroke-width="1" marker-end="url(#ah)"/>
  <text x="394" y="266" fill="#A8A29E" font-size="9" font-style="italic">.query()</text>

  <!-- S2: QUERY LAYER -->
  <rect x="220" y="284" width="320" height="50" fill="none" stroke="#1C1917" stroke-width="1.5"/>
  <text x="232" y="305" fill="#78716C" font-size="10" letter-spacing="0.5">S2</text>
  <text x="380" y="305" text-anchor="middle" fill="#1C1917" font-size="13" font-weight="500">QUERY LAYER</text>
  <text x="380" y="323" text-anchor="middle" fill="#78716C" font-size="10">filter  ·  order  ·  limit  ·  fluent builder</text>

  <!-- Transition S2 → S3 -->
  <line x1="380" y1="334" x2="380" y2="372" stroke="#8B949E" stroke-width="1" marker-end="url(#ah)"/>
  <text x="394" y="358" fill="#A8A29E" font-size="9" font-style="italic">execute()</text>

  <!-- S3: COLLECTION ENGINE -->
  <rect x="220" y="376" width="320" height="50" fill="none" stroke="#1C1917" stroke-width="1.5"/>
  <text x="232" y="397" fill="#78716C" font-size="10" letter-spacing="0.5">S3</text>
  <text x="380" y="397" text-anchor="middle" fill="#1C1917" font-size="13" font-weight="500">COLLECTION ENGINE</text>
  <text x="380" y="415" text-anchor="middle" fill="#78716C" font-size="10">records  ·  indexes  ·  MVCC</text>

  <!-- Transition S3 → S4 -->
  <line x1="380" y1="426" x2="380" y2="464" stroke="#8B949E" stroke-width="1" marker-end="url(#ah)"/>
  <text x="394" y="450" fill="#A8A29E" font-size="9" font-style="italic">read/write</text>

  <!-- S4: PAGE STORE -->
  <rect x="220" y="468" width="320" height="50" fill="none" stroke="#1C1917" stroke-width="1.5"/>
  <text x="232" y="489" fill="#78716C" font-size="10" letter-spacing="0.5">S4</text>
  <text x="380" y="489" text-anchor="middle" fill="#1C1917" font-size="13" font-weight="500">PAGE STORE</text>
  <text x="380" y="507" text-anchor="middle" fill="#78716C" font-size="10">4 KB fixed pages  ·  overflow chains</text>

  <!-- Branch from S4 -->
  <line x1="380" y1="518" x2="380" y2="548" stroke="#8B949E" stroke-width="1"/>

  <!-- Left branch to WAL -->
  <line x1="380" y1="548" x2="200" y2="548" stroke="#059669" stroke-width="1"/>
  <line x1="200" y1="548" x2="200" y2="578" stroke="#059669" stroke-width="1" marker-end="url(#ahG)"/>
  <text x="290" y="542" text-anchor="middle" fill="#059669" font-size="9" font-style="italic">durability</text>

  <!-- Right branch to Encryption -->
  <line x1="380" y1="548" x2="560" y2="548" stroke="#7C3AED" stroke-width="1"/>
  <line x1="560" y1="548" x2="560" y2="578" stroke="#7C3AED" stroke-width="1" marker-end="url(#ahP)"/>
  <text x="470" y="542" text-anchor="middle" fill="#7C3AED" font-size="9" font-style="italic">security</text>

  <!-- S5a: WAL -->
  <rect x="80" y="582" width="240" height="60" fill="none" stroke="#059669" stroke-width="1.5"/>
  <text x="92" y="603" fill="#059669" font-size="10" letter-spacing="0.5">S5a</text>
  <text x="200" y="603" text-anchor="middle" fill="#1C1917" font-size="13" font-weight="500">WRITE-AHEAD LOG</text>
  <text x="200" y="621" text-anchor="middle" fill="#78716C" font-size="10">append → fsync → crash recovery</text>
  <!-- Self-loop on WAL for replay -->
  <path d="M80,600 Q50,600 50,620 Q50,642 80,642" fill="none" stroke="#059669" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="36" y="624" fill="#059669" font-size="8" text-anchor="end">replay</text>

  <!-- S5b: ENCRYPTION -->
  <rect x="440" y="582" width="240" height="60" fill="none" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="452" y="603" fill="#7C3AED" font-size="10" letter-spacing="0.5">S5b</text>
  <text x="560" y="603" text-anchor="middle" fill="#1C1917" font-size="13" font-weight="500">ENCRYPTION</text>
  <text x="560" y="621" text-anchor="middle" fill="#78716C" font-size="10">AES-GCM  ·  encrypted pages</text>
  <!-- Lock symbol -->
  <rect x="664" y="594" width="10" height="8" fill="none" stroke="#7C3AED" stroke-width="1"/>
  <path d="M666,594 Q666,588 669,588 Q672,588 672,594" fill="none" stroke="#7C3AED" stroke-width="1"/>

  <!-- Both converge to DISK -->
  <line x1="200" y1="642" x2="200" y2="680" stroke="#059669" stroke-width="1"/>
  <line x1="560" y1="642" x2="560" y2="680" stroke="#7C3AED" stroke-width="1"/>
  <line x1="200" y1="680" x2="560" y2="680" stroke="#8B949E" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="380" y1="680" x2="380" y2="710" stroke="#8B949E" stroke-width="1" marker-end="url(#ah)"/>

  <!-- DISK — double border like an accept state -->
  <rect x="300" y="714" width="160" height="44" fill="none" stroke="#1C1917" stroke-width="1.5"/>
  <rect x="304" y="718" width="152" height="36" fill="none" stroke="#1C1917" stroke-width="0.5"/>
  <text x="380" y="741" text-anchor="middle" fill="#1C1917" font-size="12" font-weight="500">LOCAL DISK</text>

  <!-- ===== LEGEND ===== -->
  <line x1="80" y1="800" x2="680" y2="800" stroke="#E7E5E4" stroke-width="0.5"/>

  <line x1="80" y1="828" x2="104" y2="828" stroke="#D97706" stroke-width="1.5"/>
  <text x="112" y="832" fill="#78716C" font-size="10">app boundary</text>

  <line x1="220" y1="828" x2="244" y2="828" stroke="#1C1917" stroke-width="1.5"/>
  <text x="252" y="832" fill="#78716C" font-size="10">core engine</text>

  <line x1="370" y1="828" x2="394" y2="828" stroke="#059669" stroke-width="1.5"/>
  <text x="402" y="832" fill="#78716C" font-size="10">durability</text>

  <line x1="500" y1="828" x2="524" y2="828" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="532" y="832" fill="#78716C" font-size="10">security</text>

  <!-- Double-border = terminal state -->
  <rect x="80" y="848" width="12" height="10" fill="none" stroke="#1C1917" stroke-width="1"/>
  <rect x="82" y="850" width="8" height="6" fill="none" stroke="#1C1917" stroke-width="0.5"/>
  <text x="100" y="858" fill="#78716C" font-size="10">terminal state</text>

  <text x="680" y="858" text-anchor="end" fill="#D6D3D1" font-size="9">blazedb.dev</text>
</svg>